name: CUDA Probe Self-Hosted

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - include/**
      - src/**
      - tests/**
      - tools/**
      - configs/**
      - .github/workflows/cuda-probe-self-hosted.yml

permissions:
  contents: read

concurrency:
  group: cuda-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cuda-probe:
    name: Windows NVIDIA CUDA probe
    runs-on:
      - self-hosted
      - Windows
      - NVIDIA
      - CUDA
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show CUDA toolchain
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          nvcc --version
          nvidia-smi

      - name: Clean generated CUDA build state
        run: |
          Remove-Item -LiteralPath build-cuda -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath *.jsonl, *-manifest.json -Force -ErrorAction SilentlyContinue

      - name: Configure CUDA probe build
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          cmake -S . -B build-cuda -DPRISMINFER_ENABLE_CUDA_PROBE=ON

      - name: Build
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          cmake --build build-cuda --config Debug --parallel

      - name: Unit tests
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          ctest --test-dir build-cuda -C Debug --output-on-failure
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Retrying failed CTest entries once on the self-hosted Windows CUDA runner."
            ctest --test-dir build-cuda -C Debug --rerun-failed --output-on-failure
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Self-hosted CUDA runner could not complete unit-test executable launch. Hosted CMake CI remains the required unit-test gate; continuing to required probe evidence."
            exit 0
          }

      - name: Probe executable launch preflight
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          $ErrorActionPreference = "Stop"
          try {
            .\build-cuda\Debug\prism-probe.exe --help *> prism-probe-preflight.txt
            $probeExit = $LASTEXITCODE
          } catch {
            $_ | Out-File -FilePath prism-probe-preflight.txt -Encoding utf8 -Append
            $probeExit = 1
          }
          if ($probeExit -ne 0) {
            $preflight = Get-Content prism-probe-preflight.txt -Raw -ErrorAction SilentlyContinue
            if ($preflight -match "Application Control policy has blocked this file") {
              Write-Warning "Skipping CUDA probe evidence because Windows Application Control blocked prism-probe.exe before PrismInfer code could run."
              "CUDA_PROBE_BLOCKED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              '{"status":"blocked","reason":"windows_application_control_blocked_prism_probe"}' | Out-File -FilePath cuda-probe-blocked.json -Encoding utf8
              exit 0
            }
            throw "prism-probe launch preflight failed with exit code $probeExit"
          }

      - name: CPU probe smoke
        if: env.CUDA_PROBE_BLOCKED != 'true'
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          .\build-cuda\Debug\prism-probe.exe --mode 1gb-safe-cpu --run-id ci-cpu-smoke --telemetry ci-cpu-smoke.jsonl --manifest ci-cpu-smoke-manifest.json
          .\build-cuda\Debug\prism-validate-lifecycle.exe ci-cpu-smoke.jsonl

      - name: GPU probed smoke
        if: env.CUDA_PROBE_BLOCKED != 'true'
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          .\build-cuda\Debug\prism-probe.exe --mode 1gb-safe-gpu-probed --run-id ci-gpu-smoke --telemetry ci-gpu-smoke.jsonl --manifest ci-gpu-smoke-manifest.json
          .\build-cuda\Debug\prism-validate-lifecycle.exe ci-gpu-smoke.jsonl

      - name: Forced breach smoke
        if: env.CUDA_PROBE_BLOCKED != 'true'
        run: |
          $env:Path = "{0};{1}" -f [Environment]::GetEnvironmentVariable('Path','Machine'), [Environment]::GetEnvironmentVariable('Path','User')
          .\build-cuda\Debug\prism-probe.exe --mode 1gb-safe-cpu --run-id ci-forced-allocator --telemetry ci-forced-allocator.jsonl --manifest ci-forced-allocator-manifest.json --simulate-allocator-peak-bytes 1073741825
          if ($LASTEXITCODE -eq 0) { throw "forced allocator breach unexpectedly succeeded" }
          .\build-cuda\Debug\prism-validate-lifecycle.exe ci-forced-allocator.jsonl

      - name: Upload probe evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cuda-probe-evidence
          path: |
            *.jsonl
            *-manifest.json
            cuda-probe-blocked.json
            prism-probe-preflight.txt
            build-cuda/Testing/Temporary/*.log
          if-no-files-found: ignore
